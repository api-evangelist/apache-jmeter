naftiko: "1.0.0-alpha1"

info:
  label: "Apache JMeter Load Test Management"
  description: "Workflow capability for QA engineers and performance engineers to manage and monitor Apache JMeter load tests via the REST API."
  tags:
    - Apache JMeter
    - Load Testing
    - Performance Engineering
    - QA Automation
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      JMETER_API_URL: JMETER_API_URL

capability:
  consumes:
    - import: jmeter-rest-api
      location: ./shared/jmeter-rest-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: jmeter-load-test-api
      description: "Unified REST API for Apache JMeter load test management."
      resources:
        - path: /v1/tests/run
          name: test-run
          operations:
            - method: POST
              name: start-test
              call: "jmeter-rest-api.start-test"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tests/status
          name: test-status
          operations:
            - method: GET
              name: get-status
              call: "jmeter-rest-api.get-status"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tests/results
          name: test-results
          operations:
            - method: GET
              name: get-results
              call: "jmeter-rest-api.get-results"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: jmeter-load-test-mcp
      transport: http
      description: "MCP server for AI-assisted Apache JMeter load test management."
      tools:
        - name: start-load-test
          description: Start an Apache JMeter load test with a specified test plan
          hints:
            readOnly: false
          call: "jmeter-rest-api.start-test"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stop-load-test
          description: Stop the currently running JMeter load test
          hints:
            readOnly: false
            destructive: false
          call: "jmeter-rest-api.stop-test"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-test-status
          description: Get current status and metrics of a running JMeter test
          hints:
            readOnly: true
            openWorld: true
          call: "jmeter-rest-api.get-status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-test-results
          description: Retrieve performance test results including response times and throughput
          hints:
            readOnly: true
            openWorld: true
          call: "jmeter-rest-api.get-results"
          outputParameters:
            - type: object
              mapping: "$."
